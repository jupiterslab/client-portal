<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.Lab — Consultant Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0B1F3A;
    --navy-mid: #0D2847;
    --lavender: #C5B8E8;
    --lav-light: #EDE8F8;
    --mint: #B8DDB0;
    --mint-light: #EBF6E8;
    --gold: #F0C97A;
    --steel: #9BB5D4;
    --white: #FFFFFF;
    --off-white: #F7F5FF;
    --text: #0F0F1A;
    --mid: #3D3D55;
    --light: #666677;
    --border: #D0CCEC;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #F0EEF8; color: var(--text); min-height: 100vh; }

  /* ── LOGIN SCREEN ── */
  .login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--navy);
  }
  .login-box {
    background: var(--navy-mid);
    border: 1px solid rgba(197,184,232,0.2);
    padding: 48px;
    width: 400px;
    text-align: center;
  }
  .login-logo {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.35em;
    color: var(--lavender);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .login-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 32px;
  }
  .login-input {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(197,184,232,0.3);
    padding: 14px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--white);
    outline: none;
    margin-bottom: 16px;
    letter-spacing: 0.1em;
  }
  .login-input::placeholder { color: rgba(255,255,255,0.3); }
  .login-btn {
    width: 100%;
    background: var(--lavender);
    color: var(--navy);
    border: none;
    padding: 14px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    text-transform: uppercase;
  }
  .login-btn:hover { background: var(--mint); }
  .login-error { color: #FF8888; font-size: 13px; margin-top: 12px; display: none; }

  /* ── DASHBOARD ── */
  .dashboard { display: none; }
  .dash-header {
    background: var(--navy);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .dash-header-left {}
  .dash-studio {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: var(--lavender);
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .dash-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--white);
  }
  .dash-logout {
    font-size: 12px;
    color: var(--light);
    cursor: pointer;
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.05em;
  }
  .dash-logout:hover { color: var(--lavender); }

  /* ── MAIN CONTENT ── */
  .dash-body { padding: 40px; max-width: 1100px; margin: 0 auto; }

  .dash-section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--mid);
    margin-bottom: 16px;
  }

  /* ── CLIENT CARDS ── */
  .client-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
    margin-bottom: 48px;
  }
  .client-card {
    background: var(--white);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .client-card:hover { border-color: var(--lavender); box-shadow: 0 4px 20px rgba(11,31,58,0.08); }
  .client-card.active { border-color: var(--navy); box-shadow: 0 4px 20px rgba(11,31,58,0.12); }
  .card-header {
    background: var(--navy);
    padding: 18px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--white);
  }
  .card-score-badge {
    background: rgba(184,221,176,0.15);
    border: 1px solid rgba(184,221,176,0.4);
    padding: 4px 12px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--mint);
  }
  .card-body { padding: 16px 20px; }
  .card-stages {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 14px;
  }
  .stage-pill {
    text-align: center;
    padding: 6px 4px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-radius: 1px;
  }
  .stage-pill.complete { background: var(--mint-light); color: #1A4A2A; }
  .stage-pill.active { background: var(--lav-light); color: var(--navy); }
  .stage-pill.locked { background: #EEECF5; color: #888899; }
  .card-link {
    font-size: 12px;
    color: var(--light);
    font-style: italic;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-link a {
    color: var(--navy);
    text-decoration: none;
    font-style: normal;
    font-weight: 500;
  }
  .card-link a:hover { color: var(--lavender); }

  /* ── CLIENT DETAIL ── */
  .client-detail {
    background: var(--white);
    border: 1px solid var(--border);
    margin-bottom: 40px;
    display: none;
  }
  .client-detail.visible { display: block; }
  .detail-header {
    background: var(--navy-mid);
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .detail-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--white);
  }
  .detail-close {
    background: none;
    border: none;
    color: var(--light);
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
  }
  .detail-close:hover { color: var(--lavender); }
  .detail-body { padding: 32px; }

  /* Stage unlock controls */
  .unlock-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }
  .unlock-cell {
    border: 1px solid var(--border);
    padding: 16px;
  }
  .unlock-cell-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 8px;
  }
  .unlock-cell-status {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 10px;
    display: inline-block;
    margin-bottom: 12px;
  }
  .unlock-cell-status.complete { background: var(--mint-light); color: #1A4A2A; }
  .unlock-cell-status.active { background: var(--lav-light); color: var(--navy); }
  .unlock-cell-status.locked { background: #EEECF5; color: #888899; }
  .unlock-btn {
    width: 100%;
    padding: 8px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    border: none;
    cursor: pointer;
    text-transform: uppercase;
  }
  .unlock-btn.mark-complete { background: var(--mint); color: var(--navy); }
  .unlock-btn.mark-complete:hover { background: #8EC886; }
  .unlock-btn.mark-locked { background: #EEECF5; color: #666677; }
  .unlock-btn.mark-locked:hover { background: #DDD9EE; }

  /* Answers view */
  .answers-section { margin-top: 8px; }
  .answers-stage-block { margin-bottom: 24px; }
  .answers-stage-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--navy);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 0;
    border-bottom: 2px solid var(--border);
    margin-bottom: 12px;
  }
  .answer-row {
    padding: 10px 0;
    border-bottom: 1px solid #F0EEF8;
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 16px;
  }
  .answer-key {
    font-size: 11px;
    font-weight: 700;
    color: var(--light);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding-top: 2px;
  }
  .answer-value {
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
  }
  .answer-value.empty { color: #BBBBCC; font-style: italic; }
  .loading-text { font-size: 14px; color: var(--light); font-style: italic; padding: 20px 0; }
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Jupiter's Lab Creative Studio</div>
    <div class="login-title">Consultant Dashboard</div>
    <input type="password" class="login-input" id="passInput" placeholder="Enter access code" onkeydown="if(event.key==='Enter') checkPass()">
    <button class="login-btn" onclick="checkPass()">Access Dashboard</button>
    <div class="login-error" id="loginError">Incorrect access code.</div>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div class="dashboard" id="dashboard">
  <div class="dash-header">
    <div class="dash-header-left">
      <div class="dash-studio">Jupiter's Lab Creative Studio</div>
      <div class="dash-title">Client Portal Dashboard</div>
    </div>
    <button class="dash-logout" onclick="logout()">Sign Out</button>
  </div>

  <div class="dash-body">

    <div class="dash-section-label">Active Clients</div>
    <div class="client-grid" id="clientGrid"></div>

    <div class="client-detail" id="clientDetail">
      <div class="detail-header">
        <div class="detail-name" id="detailName">—</div>
        <button class="detail-close" onclick="closeDetail()">✕</button>
      </div>
      <div class="detail-body">

        <div class="dash-section-label">Stage Status — Click to Update</div>
        <div class="unlock-grid" id="unlockGrid"></div>

        <div class="dash-section-label">Client Answers</div>
        <div class="answers-section" id="answersSection">
          <div class="loading-text">Select a client to view their answers.</div>
        </div>

      </div>
    </div>

  </div>
</div>

<script>
const SUPABASE_URL = 'https://fgmfkmcqllncnujazgce.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnbWZrbWNxbGxuY251amF6Z2NlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0ODA2MjMsImV4cCI6MjA5MDA1NjYyM30.ith7Y51PnEF2wFwtToSS6n74uYHg4Ks7c2QBGlfd6hI';

// ── ACCESS CODE ── Change this to whatever you want
const ACCESS_CODE = 'jupiterslab2025';

const CLIENTS = [
  { id: 'blacklist-network',  name: 'Blacklist Network',  tier: 'Tier 2' },
  { id: 'newsky-productions',  name: 'New Sky Productions', tier: 'Tier 2' },
  { id: 'talented-tenth-sc',   name: 'Talented Tenth SC',  tier: 'Tier 1' },
];

const STAGES = ['clarify', 'order', 'revenue', 'execute'];
const STAGE_LABELS = { clarify: 'Clarify', order: 'Order', revenue: 'Revenue', execute: 'Execute' };

// Field label map for readable display
const FIELD_LABELS = {
  field_001: 'Q1 — Offer Description',
  field_002: 'Q2 — Last Client / Why You',
  field_003: 'Q3 — Client After 90 Days',
  field_004: 'Q4 — Non-Revenue Building',
  field_005: 'Q5 — What Would Break First',
  field_006: 'Q6 — Why Last Client Didn\'t Move',
  field_007: 'Assessment — Readiness Score',
  field_008: 'Assessment — Key Findings',
  field_009: 'Assessment — Corrected Sequence',
  field_010: 'Order Q1 — Last 3 Investments',
  field_011: 'Order Q2 — Client Agreement',
  field_012: 'Order Q3 — Onboarding Process',
  field_013: 'Order Q4 — What Lives in Your Head',
  field_014: 'Order — Sequence Errors',
  field_015: 'Order — Corrected Sequence',
  field_016: 'Order — Infrastructure Gaps',
  field_017: 'Revenue Q1 — Offer Suite',
  field_018: 'Revenue Q2 — Monthly Target',
  field_019: 'Revenue Q3 — Underpricing',
  field_020: 'Revenue Q4 — Conversion Rate',
  field_021: 'Revenue Q5 — Top Revenue Leak',
  field_022: 'Revenue — Offer Recommendation',
  field_023: 'Revenue — 90-Day Target',
  field_024: 'Revenue — Leaks Identified',
  field_025: 'Execute Q1 — Top 3 Actions',
  field_026: 'Execute Q2 — What to Eliminate',
  field_027: 'Execute Q3 — Systems Needed',
  field_028: 'Execute Q4 — Success at 90 Days',
  field_029: 'Execute — 3 Priorities',
  field_030: 'Execute — Week-by-Week Roadmap',
  field_031: 'Execute — Constraints',
  dim_score_01: 'Score — Offer Clarity',
  dim_score_02: 'Score — Audience Precision',
  dim_score_03: 'Score — Sequence Integrity',
  dim_score_04: 'Score — Revenue Structure',
  dim_score_05: 'Score — Infrastructure Readiness',
  dim_note_01: 'Note — Offer Clarity',
  dim_note_02: 'Note — Audience Precision',
  dim_note_03: 'Note — Sequence Integrity',
  dim_note_04: 'Note — Revenue Structure',
  dim_note_05: 'Note — Infrastructure Readiness',
  stage_complete_01: 'Clarify Complete',
  stage_complete_02: 'Order Complete',
  stage_complete_03: 'Revenue Complete',
  stage_complete_04: 'Execute Complete',
};

let activeClient = null;
let allData = {};

// ── AUTH ──
function checkPass() {
  const val = document.getElementById('passInput').value;
  if (val === ACCESS_CODE) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadDashboard();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function logout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('passInput').value = '';
}

// ── FETCH CLIENT DATA ──
async function fetchClientData(clientId) {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/portal_responses?client_id=eq.${clientId}&select=field_key,field_value`,
    { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
  );
  if (!res.ok) return {};
  const rows = await res.json();
  const map = {};
  rows.forEach(r => { map[r.field_key] = r.field_value; });
  return map;
}

async function saveClientField(clientId, key, value) {
  await fetch(`${SUPABASE_URL}/rest/v1/portal_responses`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Prefer': 'resolution=merge-duplicates'
    },
    body: JSON.stringify({ client_id: clientId, field_key: key, field_value: value, updated_at: new Date().toISOString() })
  });
}

// ── SCORE CALCULATION ──
function calcScore(data) {
  let total = 0;
  let filled = 0;
  for (let i = 1; i <= 5; i++) {
    const val = parseInt(data[`dim_score_0${i}`]);
    if (!isNaN(val)) { total += val; filled++; }
  }
  return filled > 0 ? total : null;
}

function scoreBand(score) {
  if (score === null) return '—';
  if (score >= 40) return 'Foundation Solid';
  if (score >= 28) return 'Partially Built';
  if (score >= 15) return 'Early Stage';
  return 'Pre-Foundation';
}

function stageStatus(data, stage) {
  const stageIndex = STAGES.indexOf(stage) + 1;
  const completeKey = `stage_complete_0${stageIndex}`;
  if (data[completeKey] === 'true') return 'complete';
  // Check if previous stage is complete
  if (stageIndex === 1) return 'active';
  const prevKey = `stage_complete_0${stageIndex - 1}`;
  if (data[prevKey] === 'true') return 'active';
  return 'locked';
}

// ── LOAD DASHBOARD ──
async function loadDashboard() {
  const grid = document.getElementById('clientGrid');
  grid.innerHTML = '<div class="loading-text">Loading clients...</div>';

  // Fetch all client data
  for (const client of CLIENTS) {
    allData[client.id] = await fetchClientData(client.id);
  }

  renderCards();
}

function renderCards() {
  const grid = document.getElementById('clientGrid');
  grid.innerHTML = '';

  CLIENTS.forEach(client => {
    const data = allData[client.id] || {};
    const score = calcScore(data);
    const band = scoreBand(score);

    const card = document.createElement('div');
    card.className = 'client-card' + (activeClient === client.id ? ' active' : '');
    card.onclick = () => openDetail(client.id);

    const stagesHtml = STAGES.map(s => {
      const status = stageStatus(data, s);
      return `<div class="stage-pill ${status}">${STAGE_LABELS[s]}</div>`;
    }).join('');

    const portalUrl = `${window.location.origin}/index.html?client=${client.id}`;

    card.innerHTML = `
      <div class="card-header">
        <div class="card-name">${client.name}</div>
        <div class="card-score-badge">${score !== null ? score + '/50' : '—'}</div>
      </div>
      <div class="card-body">
        <div class="card-stages">${stagesHtml}</div>
        <div class="card-link">
          Portal: <a href="${portalUrl}" target="_blank">Open Client View ↗</a>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ── CLIENT DETAIL ──
async function openDetail(clientId) {
  activeClient = clientId;
  const client = CLIENTS.find(c => c.id === clientId);
  const data = allData[clientId] || {};

  document.getElementById('detailName').textContent = client.name;
  document.getElementById('clientDetail').classList.add('visible');

  renderUnlockGrid(clientId, data);
  renderAnswers(clientId, data);
  renderCards();
}

function closeDetail() {
  activeClient = null;
  document.getElementById('clientDetail').classList.remove('visible');
  renderCards();
}

function renderUnlockGrid(clientId, data) {
  const grid = document.getElementById('unlockGrid');
  grid.innerHTML = '';

  STAGES.forEach((stage, i) => {
    const status = stageStatus(data, stage);
    const completeKey = `stage_complete_0${i + 1}`;
    const isComplete = data[completeKey] === 'true';

    const cell = document.createElement('div');
    cell.className = 'unlock-cell';
    cell.innerHTML = `
      <div class="unlock-cell-name">${STAGE_LABELS[stage]}</div>
      <div class="unlock-cell-status ${status}">${status.charAt(0).toUpperCase() + status.slice(1)}</div>
      <button class="unlock-btn ${isComplete ? 'mark-locked' : 'mark-complete'}"
        onclick="toggleStage('${clientId}', '${completeKey}', ${isComplete})">
        ${isComplete ? 'Mark Incomplete' : 'Mark Complete'}
      </button>
    `;
    grid.appendChild(cell);
  });
}

async function toggleStage(clientId, key, currentlyComplete) {
  const newValue = currentlyComplete ? 'false' : 'true';
  await saveClientField(clientId, key, newValue);
  allData[clientId][key] = newValue;
  renderUnlockGrid(clientId, allData[clientId]);
  renderCards();
}

function renderAnswers(clientId, data) {
  const section = document.getElementById('answersSection');

  // Group fields by stage
  const groups = {
    'Readiness Score': ['dim_score_01','dim_score_02','dim_score_03','dim_score_04','dim_score_05','dim_note_01','dim_note_02','dim_note_03','dim_note_04','dim_note_05'],
    'Clarify': ['field_001','field_002','field_003','field_004','field_005','field_006','field_007','field_008','field_009'],
    'Order': ['field_010','field_011','field_012','field_013','field_014','field_015','field_016'],
    'Revenue': ['field_017','field_018','field_019','field_020','field_021','field_022','field_023','field_024'],
    'Execute': ['field_025','field_026','field_027','field_028','field_029','field_030','field_031'],
  };

  let html = '';
  Object.entries(groups).forEach(([groupName, keys]) => {
    const rows = keys.map(key => {
      const val = data[key];
      const label = FIELD_LABELS[key] || key;
      const hasValue = val && val.trim() && val !== 'false';
      return `<div class="answer-row">
        <div class="answer-key">${label}</div>
        <div class="answer-value ${hasValue ? '' : 'empty'}">${hasValue ? val : 'Not yet answered'}</div>
      </div>`;
    }).join('');

    html += `<div class="answers-stage-block">
      <div class="answers-stage-label">${groupName}</div>
      ${rows}
    </div>`;
  });

  section.innerHTML = html;
}
</script>
</body>
</html>
